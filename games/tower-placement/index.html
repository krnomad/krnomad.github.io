<!-- PROTOTYPE - NOT FOR PRODUCTION -->
<!-- Question: Is slot-based tower placement + wave defense fun on mobile landscape? -->
<!-- Date: 2026-03-26 (v4 - Mobile QA Fix) -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a15">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap">
<title>풍운지기</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%;
  background: #0a0a15;
  font-family: 'Noto Sans KR', sans-serif;
  color: #e0d5c1;
  overflow: hidden;
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  user-select: none;
  position: fixed;
  top: 0; left: 0;
}
#game-container {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
}
canvas {
  position: absolute;
  top: 0; left: 0;
  touch-action: none;
}
/* ── Top HUD ── */
#ui-top {
  position: fixed;
  top: 0; left: 0; right: 72px;
  padding: 6px 12px;
  display: flex;
  justify-content: space-around;
  align-items: center;
  background: linear-gradient(180deg, rgba(10,10,21,0.95) 0%, transparent 100%);
  font-size: 13px;
  z-index: 10;
  pointer-events: none;
  height: 32px;
}
.ui-stat {
  display: flex; align-items: center; gap: 3px;
}
.ui-stat .val { font-weight: 700; color: #ffd700; }
/* ── Right Side Panel ── */
#right-panel {
  position: fixed;
  top: 0; right: 0;
  bottom: 0;
  width: 72px;
  padding: 6px 4px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
  background: rgba(10,10,21,0.92);
  border-left: 1px solid #3a2a1a;
  z-index: 10;
  overflow-y: auto;
  touch-action: pan-y;
  -webkit-overflow-scrolling: touch;
}
#right-panel::-webkit-scrollbar { display: none; }
.hero-card {
  width: 60px; height: 58px;
  border: 2px solid #3a2a1a;
  border-radius: 6px;
  background: linear-gradient(135deg, #1a1530, #2a2040);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  position: relative;
  overflow: hidden;
  flex-shrink: 0;
  touch-action: manipulation;
}
.hero-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0;
  height: 2px;
  background: var(--hero-color);
  opacity: 0.6;
}
.hero-card.selected {
  border-color: #ffd700;
  box-shadow: 0 0 10px rgba(255,215,0,0.4);
}
.hero-card .icon { font-size: 18px; }
.hero-card .name { font-size: 9px; color: #c8a96e; font-weight: 700; }
.hero-card .cost { font-size: 8px; color: #8b7355; }
.panel-btn {
  width: 60px; height: 36px;
  border-radius: 5px;
  font-family: inherit;
  font-weight: 700;
  cursor: pointer;
  flex-shrink: 0;
  border: none;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}
#wave-btn {
  background: linear-gradient(135deg, #8b2500, #a03000);
  color: #ffd700;
  border: 2px solid #c8a96e;
  font-size: 11px;
}
#wave-btn:disabled { opacity: 0.35; }
#sell-btn {
  background: #3a1515;
  color: #ff6b6b;
  border: 1px solid #6b3333;
  font-size: 9px;
  display: none;
}
#speed-btn {
  background: #1a2a1a;
  color: #88bb88;
  border: 1px solid #3a5a3a;
  font-size: 11px;
}
/* ── Left Skill Bar ── */
#skill-bar {
  position: fixed;
  left: 4px;
  top: 50%;
  transform: translateY(-50%);
  display: flex;
  flex-direction: column;
  gap: 5px;
  z-index: 10;
  pointer-events: none;
}
.skill-btn {
  width: 42px; height: 42px;
  border: 2px solid #3a2a1a;
  border-radius: 8px;
  background: linear-gradient(135deg, #1a1530, #2a2040);
  color: #c8a96e;
  font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  position: relative;
  pointer-events: auto;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}
.skill-btn.ready { border-color: #ffd700; box-shadow: 0 0 6px rgba(255,215,0,0.3); }
.skill-btn .cd-overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.7);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  color: #ff6b6b; font-size: 12px; font-weight: 700;
}
/* ── Overlays ── */
#combo-display {
  position: fixed;
  top: 38px; left: 50%;
  transform: translateX(-50%);
  font-size: 18px; font-weight: 700;
  color: #ff6b35;
  text-shadow: 0 0 15px rgba(255,107,53,0.8);
  z-index: 10; pointer-events: none;
  opacity: 0; transition: opacity 0.3s;
}
#wave-announce {
  position: fixed;
  top: 40%; left: 50%;
  transform: translate(-50%, -50%);
  font-size: 22px; font-weight: 700;
  color: #ffd700;
  text-shadow: 0 0 20px rgba(255,215,0,0.6), 0 2px 4px rgba(0,0,0,0.8);
  z-index: 20; pointer-events: none;
  opacity: 0; transition: opacity 0.5s;
  white-space: nowrap;
}
/* ── End Screens ── */
.end-screen {
  position: fixed; inset: 0;
  display: none;
  flex-direction: column;
  align-items: center; justify-content: center;
  background: rgba(0,0,0,0.85);
  z-index: 100;
}
.end-screen h1 { font-size: 32px; margin-bottom: 4px; }
#game-over-screen h1 { color: #ff4444; text-shadow: 0 0 20px rgba(255,0,0,0.5); }
#victory-screen h1 { color: #ffd700; text-shadow: 0 0 20px rgba(255,215,0,0.5); }
.end-stats { font-size: 12px; color: #aaa; margin: 6px 0 14px; }
.restart-btn {
  padding: 12px 36px;
  background: linear-gradient(135deg, #4a3728, #6b5344);
  color: #ffd700;
  border: 2px solid #c8a96e;
  border-radius: 8px;
  font-family: inherit;
  font-size: 16px; font-weight: 700;
  touch-action: manipulation;
}
/* ── Landscape lock ── */
#rotate-msg {
  position: fixed; inset: 0;
  background: #0a0a15;
  display: none;
  flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 999;
  font-size: 18px; text-align: center; gap: 16px;
}
#rotate-msg .ri { font-size: 48px; animation: ra 2s infinite; }
@keyframes ra { 0%,100%{transform:rotate(0)} 50%{transform:rotate(90deg)} }
@media (orientation: portrait) { #rotate-msg { display: flex; } }
</style>
</head>
<body>
<div id="game-container"><canvas id="game"></canvas></div>

<div id="ui-top">
  <div class="ui-stat">💰<span class="val" id="gold">150</span></div>
  <div class="ui-stat">❤️<span class="val" id="lives">20</span></div>
  <div class="ui-stat">🌊<span class="val" id="wave-num">0</span>/8</div>
  <div class="ui-stat">💀<span class="val" id="kills">0</span></div>
</div>

<div id="right-panel">
  <div id="hero-panel"></div>
  <button class="panel-btn" id="wave-btn">▶ 시작</button>
  <button class="panel-btn" id="sell-btn">🗑 매각</button>
  <button class="panel-btn" id="speed-btn">⏩ x1</button>
</div>

<div id="skill-bar"></div>
<div id="combo-display"></div>
<div id="wave-announce"></div>

<div class="end-screen" id="game-over-screen">
  <h1>패배</h1>
  <p>마을이 함락되었습니다</p>
  <div class="end-stats" id="go-stats"></div>
  <button class="restart-btn" onclick="location.reload()">다시 도전</button>
</div>
<div class="end-screen" id="victory-screen">
  <h1>승리!</h1>
  <p>요괴 군단을 물리쳤습니다!</p>
  <div class="end-stats" id="v-stats"></div>
  <button class="restart-btn" onclick="location.reload()">다시 플레이</button>
</div>

<div id="rotate-msg">
  <div class="ri">📱</div>
  <div>화면을 가로로 돌려주세요</div>
</div>

<script src="game.js"></script>
</body>
</html>
