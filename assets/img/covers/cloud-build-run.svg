  <desc id="desc">Indigo and sky concept cover for build and deployment workflow.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#172554"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="150" cy="120" r="180" fill="#93c5fd" opacity="0.12"/>
  <rect x="120" y="200" width="190" height="120" rx="28" fill="#dbeafe"/>
  <rect x="430" y="200" width="220" height="120" rx="28" fill="#bfdbfe"/>
  <rect x="770" y="200" width="230" height="120" rx="28" fill="#eff6ff"/>
